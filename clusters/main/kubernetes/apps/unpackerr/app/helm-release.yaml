apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: unpackerr
    namespace: unpackerr
spec:
    interval: 15m
    chart:
        spec:
            chart: unpackerr
            version: 17.4.0
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    releaseName: unpackerr
    values:
        workload:
            main:
                podSpec:
                    containers:
                        main:
                            env:
                                # Sonarr Config
                                UN_SONARR_0_URL: ${UNPACKERR_SONARR_URL}
                                UN_SONARR_0_API_KEY: ${UNPACKERR_SONARR_API}
        TZ: Europe/Berlin
        credentials:
            aws:
                type: s3
                accessKey: ${AWS_ACCESS_KEY}
                bucket: ${AWS_BUCKET}
                encrKey: ${AWS_ENCR_KEY}
                secretKey: ${AWS_SECRET_KEY}
                url: ${AWS_URL}
        persistence:
            config:
                volsync:
                    - credentials: aws
                      type: restic
                      name: unpackerr-config
                      src:
                        enabled: true
                      dest:
                        enabled: true
            data-vol:
                enabled: true
                type: nfs
                mountPath: /data
                path: /mnt/Helios/data
                server: ${LOCAL_NAS_IP}
        securityContext:
            container:
                UMASK: "0022"
                runAsGroup: 568
                runAsUser: 568
            pod:
                fsGroupChangePolicy: OnRootMismatch
