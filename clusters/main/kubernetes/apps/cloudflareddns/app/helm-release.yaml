apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: cloudflareddns
    namespace: cloudflareddns
spec:
    interval: 15m
    chart:
        spec:
            chart: cloudflareddns
            version: 14.6.3
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
    values:
        # for now until image is fixed
        image:
            repository: ghcr.io/hotio/cloudflareddns
            pullPolicy: IfNotPresent
            tag: latest@sha256:4625a63c7ff5ce31e026d1328e7458ebed3682e91888b2a5155abe2afcdcb4ce
        securityContext:
            container:
                runAsNonRoot: false
                readOnlyRootFilesystem: false
                runAsUser: 0
                runAsGroup: 0
        TZ: Europe/Berlin
#        cloudflareddns:
#            api_token: ${CF_DDNS_API_TOKEN}
#            host_zone_record:
#                - domain: ${CF_DDNS_DOMAIN}
#                  record: A
#                  zone: ${CF_DDNS_ZONE}
        workload:
            main:
                podSpec:
                    containers:
                        main:
                            env:
                                UPDATE_IPV6: false
                                CF_APITOKEN: ${CF_DDNS_API_TOKEN}
                                CF_HOSTS: "ddns.${DOMAIN_0}"

