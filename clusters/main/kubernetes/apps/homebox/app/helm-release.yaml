apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: homebox
    namespace: homebox
spec:
    interval: 5m
    chart:
        spec:
            chart: homebox
            version: 10.4.0
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
            interval: 5m
    install:
        createNamespace: true
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
        TZ: Europe/Berlin
        credentials:
            aws:
                type: s3
                accessKey: ${AWS_ACCESS_KEY}
                bucket: ${AWS_BUCKET}
                encrKey: ${AWS_ENCR_KEY}
                secretKey: ${AWS_SECRET_KEY}
                url: ${AWS_URL}
        homebox:
            mailer_host: ${HOMEBOX_MAILER_HOST}
            mailer_port: 587
            mailer_from: ${HOMEBOX_MAILER_FROM}
            mailer_username: ${HOMEBOX_MAILER_USER}
            mailer_password: ${HOMEBOX_MAILER_PASS}
        workload:
            main:
              podSpec:
                containers:
                  main:
                    envFrom:
                      - secretRef:
                          name: ${HOMEBOX_SECRET}
        ingress:
            main:
                enabled: true
                ingressClassName: internal
                integrations:
                    traefik:
                        enabled: false
                    certManager:
                        enabled: true
                        certificateIssuer: domain-0-le-prod
                hosts:
                    - host: homebox.${DOMAIN_0}
                      paths:
                          - path: /
                            pathType: Prefix
        persistence:
            data:
              volsync:
                    - credentials: aws
                      type: restic
                      name: homebox-data
                      src:
                        enabled: true
                      dest:
                        enabled: true
